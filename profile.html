<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-image: url('https://i.pinimg.com/736x/8e/8c/78/8e8c78523e0b4d01fa896480aa9d04c9.jpg');
      background-size: cover;
      background-repeat: no-repeat;
    }

    .sidee {
      background-color: rgb(255, 255, 255);
      height: 100vh;
      width: 300px;
    }

    .logo {
      height: 200px;
      width: 200px;
    }

    .amazing {
        color:  rgb(12, 36, 111);
      background-color: lightgray;
      height: 75px;
      width: 225px;
      margin-left: 35px;
      margin-top: 20px;
    }

    h1{
        color: rgb(12, 36, 111);
    }

    h2{
        color: rgb(12, 36, 111)
    }

    .container{
        color:  rgb(12, 36, 111);
    }

    #foot {
      background-color: rgb(12, 36, 111);
      width: 100%;
    }

    .btn{
        color:rgb(12, 36, 111) ;
    }

    .information {
      background-color: white;
      min-height: 400px;
    }

    .pfp {
      background-color: white;
      min-height: 300px;
    }

    .choose {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #333;
    }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <!-- Navbar -->
      <div class="col-md-3 sidee text-light p-3">
        <h1 class="amazing p-2 rounded-5 text-center">Profile</h1>
        <img src="https://cdn.discordapp.com/attachments/1490869801055162588/1495939927228022824/ICT_logo_1.png?ex=69eb5ddf&is=69ea0c5f&hm=2afbefa4da475c8736bac5999b4eba308d0e9e5537391a04a79bde5016317ad8" alt="jadnacademy" class="sqaure-circle logo">
        <br>
        <div class="container"><a class="nav-link" href="dashboard.html">Dashboard</a></div>
        <div class="container"><a class="nav-link" href="notebooks.html">Virtual Notebooks</a></div>
        <div class="container"><a class="nav-link" href="tasks.html">Tasks</a></div>
        <div class="container"><a class="nav-link" href="profile.html">Profile</a></div>
        <div class="container"><a class="nav-link" href="index.html">Logout</a></div>
      </div>

     
      <div class="col-md-9 mt-5">
        <div class="row g-4">
          <!-- student stuff -->
          <div class="col-md-6">
            <div class="information p-3 rounded-5 text-black text-center">
              <h1>Student Information</h1>
              <br>
              <h6 style="color: gray;">Student ID:</h6>
              <h6>SN654321</h6>
              <br>
              <h6 style="color: gray;">Contact Number:</h6>
              <h6>+639100000015</h6>
              <br>
              <h6 style="color: gray;">Email Address:</h6>
              <h6>randomemail@gmail.com</h6>
              <br>
              <button class="btn btn-outline rounded-5" onclick="hubert()">Change Password</button>
            </div>
          </div>

         
          <div class="col-md-6">
            <div class="pfp p-3 rounded-5 text-black text-center">
              <h2>Choose Your Profile Picture</h2>
              <img id="preview" class="choose" src="default.jpg" alt="Profile Picture">
              <br><br>
              <input type="file" id="fileInput" accept="image/*">
            </div>
          </div>
        </div>

        <br><br>
        <footer class="text-light text-center" id="foot">© 4th Quarter Project | Made by Nathan, Aaliyah, Dani, Jilliane</footer>
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');

    fileInput.addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          preview.src = e.target.result; 
        };
        reader.readAsDataURL(file);
      }
    });

    let granted = "Time before changing current password: 67 years"; 
    function hubert(){
      alert(granted);
    }
  </script>
</body>
</html>
