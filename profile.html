<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-image: url('https://img.freepik.com/free-vector/abstract-modern-dark-black-background-design-with-stripes-lines_84443-2828.jpg?semt=ais_hybrid&w=740&q=80');
      background-size: cover;
    }

    .gir {
      background-color: black;
      height: 100vh;
      width: 300px;
    }

    .logo {
      height: 200px;
      width: 200px;
    }

    .pythus {
      background-color: lightgray;
      height: 75px;
      width: 225px;
      margin-left: 35px;
      margin-top: 20px;
    }

    .titus {
      background-color: black;
      width: 100%;
    }

    .info-card {
      background-color: white;
      min-height: 400px;
    }

    .picture-card {
      background-color: white;
      min-height: 300px;
    }

    .Sam {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #333;
    }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <div class="col-md-3 gir text-light p-3">
        <h1 class="pythus p-2 rounded-5 text-black text-center">Profile</h1>
        <img src="https://i.pinimg.com/736x/65/b4/ad/65b4ad928830ec0ed3e24c0403213bf4.jpg" alt="swiftylogo" class="rounded-circle logo">
        <br>
        <div class="container"><a class="nav-link" href="dashboard.html">Dashboard</a></div>
        <div class="container"><a class="nav-link" href="notebooks.html">Virtual Notebooks</a></div>
        <div class="container"><a class="nav-link" href="tasks.html">Tasks</a></div>
        <div class="container"><a class="nav-link" href="profile.html">Profile</a></div>
        <div class="container"><a class="nav-link" href="index.html">Logout</a></div>
      </div>

     
      <div class="col-md-9 mt-5">
        <div class="row g-4">
          <!-- Student Info -->
          <div class="col-md-6">
            <div class="info-card p-3 rounded-5 text-black text-center">
              <h1>Student Information</h1>
              <br>
              <h6 style="color: gray;">Student ID:</h6>
              <h6>SN654321</h6>
              <br>
              <h6 style="color: gray;">Contact Number:</h6>
              <h6>+639100000015</h6>
              <br>
              <h6 style="color: gray;">Email Address:</h6>
              <h6>randomemail@gmail.com</h6>
              <br>
              <button class="btn btn-info rounded-5" onclick="hubert()">Change Password</button>
            </div>
          </div>

         
          <div class="col-md-6">
            <div class="picture-card p-3 rounded-5 text-black text-center">
              <h2>Choose Your Profile Picture</h2>
              <img id="preview" class="Sam" src="default.jpg" alt="Profile Picture">
              <br><br>
              <input type="file" id="fileInput" accept="image/*">
            </div>
          </div>
        </div>

        <br><br>
        <footer class="titus text-light text-center">© 4th Quarter Project | Made by Nathan, Aaliyah, Dani, Jilliane</footer>
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');

    fileInput.addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          preview.src = e.target.result; 
        };
        reader.readAsDataURL(file);
      }
    });

    let granted = "Time before changing current password: 67 years"; 
    function hubert(){
      alert(granted);
    }
  </script>
</body>
</html>
