<body>


    <div class="container p-4 rounded-5 formmm text-dark">
        <h1 class="text-center">Login Page</h1>
  <form>
    <label>Username:</label>
    <input type="text" id="uname" class="form-control text-center" placeholder="Enter here" required>
    <br>
    <label>Password:</label>
    <input type="password" id="pwd" class="form-control text-center" placeholder="Enter here" required>
    <br>
    <input type="button" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">
    <input type="reset" id="cancel" value="Cancel" class="btn btn-info rounded-5">
  </form>
</div>


   


    <script>
        let attempt_counter = 0
        function authenticate(){
            let username = document.getElementById("uname").value;
            let pwd = document.getElementById("pwd").value;
            let granted = "Welcome " + username + "!";
            let denied = "Access denied. Account locked after 3 attempts!";


            while (attempt_counter < 3) {
            if (username === "Greenalienlover_18" && pwd === "girgirgir") {
                alert(granted);
                window.location.href = "dashboard.html";


                break; // stop loop
            }


            else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            break; // stop loop for this click
        }
    }


    if (attempt_counter >= 3) {
        alert(denied);
        document.getElementById("loginBTN").disabled = true; // disable button
    }
}
    </script>
